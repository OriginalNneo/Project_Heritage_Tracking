# AMK Heritage Race - Nginx config for finflowfx.biz
# Copy to VPS: sudo cp nginx-amk-heritage.conf /etc/nginx/sites-available/finflow
# Then: sudo nginx -t && sudo systemctl reload nginx

upstream amk_backend {
    server 127.0.0.1:8000;
}

# HTTP → redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name finflowfx.biz www.finflowfx.biz;
    return 301 https://$host$request_uri;
}

# HTTPS — Let's Encrypt
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name finflowfx.biz www.finflowfx.biz;

    ssl_certificate /etc/letsencrypt/live/finflowfx.biz-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finflowfx.biz-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # Everything goes to FastAPI backend
    location / {
        proxy_pass http://amk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
